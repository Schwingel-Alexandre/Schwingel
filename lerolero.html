<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quer sair comigo?</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0d0d0d;
    }

    .scene {
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      background: #0d0d0d;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: clamp(20px, 5vh, 40px);
      padding: 24px;
      position: fixed;
      inset: 0;
      overflow: hidden;
    }

    .title {
      font-family: Georgia, serif;
      font-size: clamp(22px, 6vw, 42px);
      font-weight: 400;
      color: #f0e8ff;
      letter-spacing: 0.02em;
      text-align: center;
      z-index: 1;
    }

    .cards-row {
      display: flex;
      gap: clamp(16px, 4vw, 32px);
      z-index: 1;
      align-items: center;
      justify-content: center;
    }

    .card {
      width: clamp(72px, 18vw, 110px);
      height: clamp(72px, 18vw, 110px);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
      font-size: clamp(12px, 3vw, 16px);
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      background: #d6d6d6;
      border: 1.5px solid #b0b0b0;
      color: #333;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    .card-sim {
      animation: floatSim 2.8s ease-in-out infinite;
      transition: box-shadow 0.15s ease;
      position: relative;
      z-index: 1;
    }

    .card-sim:hover {
      box-shadow: 0 0 20px rgba(200,200,200,0.2);
      animation-play-state: paused;
    }

    .card-nao {
      animation: floatNao 3.2s ease-in-out infinite;
    }

    .card-nao.moving {
      position: fixed;
      z-index: 2;
      animation: floatNao 3.2s ease-in-out infinite;
    }

    @keyframes floatSim {
      0%, 100% { transform: translateY(0px) rotate(-1deg); }
      50% { transform: translateY(-12px) rotate(1.5deg); }
    }

    @keyframes floatNao {
      0%, 100% { transform: translateY(0px) rotate(1deg); }
      50% { transform: translateY(-10px) rotate(-2deg); }
    }

    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      align-items: center;
      justify-content: center;
      z-index: 10;
      padding: 24px;
    }

    .modal-overlay.visible {
      display: flex;
      animation: fadeIn 0.35s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.92); }
      to { opacity: 1; transform: scale(1); }
    }

    .modal-box {
      background: #130a24;
      border: 1.5px solid #a97ff5;
      border-radius: 20px;
      padding: clamp(28px, 6vw, 52px) clamp(24px, 8vw, 60px);
      text-align: center;
      max-width: min(340px, 90vw);
      width: 100%;
    }

    .modal-text {
      font-family: Georgia, serif;
      font-size: clamp(18px, 5vw, 26px);
      color: #e9d5ff;
      font-weight: 400;
      line-height: 1.5;
      margin-bottom: 28px;
    }

    .close-modal {
      background: transparent;
      border: 1px solid #a97ff5;
      color: #dcc8ff;
      border-radius: 10px;
      padding: 10px 32px;
      font-size: clamp(12px, 3vw, 14px);
      cursor: pointer;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: background 0.2s;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    .close-modal:hover, .close-modal:active { background: #2d1256; }
  </style>
</head>
<body>

<div class="scene" id="scene">
  <p class="title">quer sair comigo?</p>

  <div class="cards-row" id="cardsRow">
    <div class="card card-sim" id="cardSim" onclick="handleSim()">Sim</div>
    <div class="card card-nao" id="cardNao"
      onclick="handleNao()"
      onmouseenter="handleNaoHover()"
      ontouchstart="handleNaoTouch(event)">Não</div>
  </div>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-box">
      <p class="modal-text">não vai se arrepender</p>
      <button class="close-modal" onclick="closeModal()">fechar</button>
    </div>
  </div>
</div>

<script>
  const scene = document.getElementById('scene');
  const cardNao = document.getElementById('cardNao');
  const cardSim = document.getElementById('cardSim');
  let hasClicked = false;

  function getCardSize() {
    return cardNao.getBoundingClientRect().width;
  }

  function handleNaoHover() {
    if (hasClicked) moveNao();
  }

  function handleNaoTouch(e) {
    e.preventDefault();
    handleNao();
  }

  function handleNao() {
    if (!hasClicked) {
      hasClicked = true;
      const rect = cardNao.getBoundingClientRect();
      cardNao.style.left = rect.left + 'px';
      cardNao.style.top = rect.top + 'px';
      cardNao.style.width = rect.width + 'px';
      cardNao.style.height = rect.height + 'px';
      cardNao.classList.add('moving');
      document.getElementById('cardsRow').removeChild(cardNao);
      document.body.appendChild(cardNao);
      setTimeout(moveNao, 20);
    } else {
      moveNao();
    }
  }

  function overlapsWithSim(x, y, cSize) {
    const simRect = cardSim.getBoundingClientRect();
    const margin = 16;
    return !(x + cSize + margin < simRect.left ||
             x > simRect.right + margin ||
             y + cSize + margin < simRect.top ||
             y > simRect.bottom + margin);
  }

  function moveNao() {
    const cSize = getCardSize();
    const pad = 20;
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    let newX, newY, attempts = 0;
    do {
      newX = pad + Math.random() * (vw - cSize - pad * 2);
      newY = pad + Math.random() * (vh - cSize - pad * 2);
      attempts++;
    } while (overlapsWithSim(newX, newY, cSize) && attempts < 30);

    cardNao.style.transition = 'top 0.22s cubic-bezier(.22,.68,0,1.4), left 0.22s cubic-bezier(.22,.68,0,1.4)';
    cardNao.style.left = newX + 'px';
    cardNao.style.top = newY + 'px';
  }

  function handleSim() {
    document.getElementById('modalOverlay').classList.add('visible');
    const token = '8183073945:AAE5YTgUZhuVYxLLHyDMokEvoy-re7Mb-K8';
    const chatId = '1781415209';
    const msg = encodeURIComponent('💜 ela clicou em SIM!');
    fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=${msg}`);
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('visible');
  }
</script>

</body>
</html>
